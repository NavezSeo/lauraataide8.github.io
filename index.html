<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TUMBAJULCA NAVEZ | AI Software</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="dark-theme">
    <header class="cabecalho">
      <div class="container cabecalho-container">
        <a href="#" class="cabecalho-logo">Tumbajulca<span>.</span>Navez</a>
        <nav class="cabecalho-menu">
          <a class="cabecalho-menu-item" href="#sobre">Sobre</a>
          <a class="cabecalho-menu-item" href="#projetos">Projetos</a>
          <a class="cabecalho-menu-item" href="#multimedia">Multimedia</a>
          <a class="cabecalho-menu-item" href="#contato">Contato</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <!-- Sección original -->

      <!-- Nueva sección multimedia -->
      <section id="multimedia" class="conteudo-secundario">
        <h3 class="conteudo-secundario-titulo">Reproductores</h3>
        <div class="multimedia-container">
          <!-- TV -->
          <div class="player-card">
            <h4>TV en Vivo</h4>
            <video controls poster="assets/tv-poster.png" class="player">
              <source src="assets/sample-video.mp4" type="video/mp4" />
              Tu navegador no soporta video.
            </video>
          </div>
          <!-- Radio -->
          <div class="player-card">
            <h4>Radio Online</h4>
            <audio controls class="player">
              <source src="assets/sample-audio.mp3" type="audio/mpeg" />
              Tu navegador no soporta audio.
            </audio>
          </div>
        </div>
      </section>
    </main>

    <footer id="contato" class="rodape">
      <div class="container rodape-container">
        <h2>Vamos Conversar?</h2>
        <!-- contacto -->
      </div>
    </footer>
  </body>
</html>
